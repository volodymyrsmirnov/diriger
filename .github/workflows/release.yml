name: Build, Sign, Notarize & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      dmg_sha256: ${{ steps.dmg_sha.outputs.sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $NEW_VERSION (tag: $NEW_TAG)"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No Developer ID Application identity found in keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Found identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build and sign
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          export SIGNING_IDENTITY="$SIGNING_IDENTITY"
          export ENTITLEMENTS_PATH="$GITHUB_WORKSPACE/Resources/Diriger.entitlements"
          export APP_VERSION="$APP_VERSION"
          bash scripts/build-app.sh

      - name: Verify code signature
        run: |
          codesign --verify --verbose=2 Diriger.app
          codesign -d --entitlements - Diriger.app
          spctl --assess --type exec --verbose=2 Diriger.app || echo "spctl assessment completed (may warn pre-notarization)"

      - name: Create ZIP for notarization
        run: |
          ditto -c -k --keepParent Diriger.app Diriger.zip

      - name: Notarize app
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPSTORE_PRIVATE_KEY" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit Diriger.zip \
            --key "$KEY_PATH" \
            --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" \
            --wait \
            --timeout 600

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple Diriger.app

      - name: Create DMG
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          DMG_NAME="Diriger-${{ steps.version.outputs.version }}.dmg"
          hdiutil create -volname "Diriger" \
            -srcfolder Diriger.app \
            -ov -format UDZO \
            "$DMG_NAME"

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$DMG_NAME" \
            --key "$KEY_PATH" \
            --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" \
            --wait \
            --timeout 600
          xcrun stapler staple "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create git tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Compute DMG checksum
        id: dmg_sha
        run: echo "sha256=$(shasum -a 256 "$DMG_NAME" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "$DMG_NAME" \
            --title "Diriger ${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Cleanup
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/AuthKey.p8" 2>/dev/null || true

  homebrew:
    needs: release
    uses: volodymyrsmirnov/homebrew-tap/.github/workflows/update.yml@main
    with:
      type: cask
      name: diriger
      version: ${{ needs.release.outputs.version }}
      desc: "Menu bar app for quickly switching between Google Chrome profiles"
      homepage: "https://github.com/volodymyrsmirnov/diriger"
      cask_url: "https://github.com/volodymyrsmirnov/diriger/releases/download/v#{version}/Diriger-#{version}.dmg"
      cask_sha256: ${{ needs.release.outputs.dmg_sha256 }}
      cask_app_name: "Diriger.app"
      cask_depends_on: 'macos: ">= :sonoma"'
    secrets:
      tap_token: ${{ secrets.TAP_GITHUB_TOKEN }}
